  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",

  <script type="module">
    import * as THREE from 'three';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    /* ── Subtitle auto-fit ── */
    function fitSubtitle() {
      const nameEl = document.querySelector('.name');
      const roleEl = document.querySelector('.role');
      const uniEl  = document.querySelector('.university');
      if (!nameEl || !roleEl) return;
      const nameWidth = nameEl.getBoundingClientRect().width * 0.82;
      if (nameWidth === 0) return;
      let lo = 6, hi = 120;
      for (let i = 0; i < 30; i++) {
        const mid = (lo + hi) / 2;
        roleEl.style.fontSize = mid + 'px';
        if (roleEl.getBoundingClientRect().width < nameWidth) lo = mid;
        else hi = mid;
      }
      roleEl.style.fontSize = lo + 'px';
      if (uniEl) uniEl.style.fontSize = lo + 'px';
    }
    window.addEventListener('load', fitSubtitle);
    window.addEventListener('resize', fitSubtitle);

    /* ── Config ── */
    const isMobile   = window.innerWidth < 768;
    const NODE_COUNT = isMobile ? 8 : 12;
    const FLOAT_AMP  = 4;
    const FLOAT_SPD  = 0.28;
    const CAM_R      = 290;

    /* ── Node data ── */
    const ALL_LABELS = [
      'Engineering','Product Strategy','Manufacturing','Leadership',
      'Innovation','Growth','Automation','3D Printing',
      'R&D','Entrepreneurship','Technical Excellence','Problem Solving',
    ];
    const ALL_EDGES = [
      [0,2],[0,6],[0,7],[0,8],[0,10],
      [1,3],[1,4],[1,5],[1,9],
      [2,6],[2,7],[3,5],[3,9],
      [4,8],[4,9],[4,10],[4,11],
      [5,9],[6,8],[7,8],[8,10],[10,11],
    ];
    const labels = ALL_LABELS.slice(0, NODE_COUNT);
    const edges  = ALL_EDGES.filter(([a,b]) => a < NODE_COUNT && b < NODE_COUNT);

    /* ── Scene ── */
    const wrapper = document.getElementById('canvas-wrapper');
    const canvas  = document.getElementById('three-canvas');
    const scene   = new THREE.Scene();
    const camera  = new THREE.PerspectiveCamera(52, 1, 0.1, 2000);

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    labelRenderer.domElement.style.overflow = 'hidden';
    wrapper.appendChild(labelRenderer.domElement);

    /* ── Lighting ── */
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const kl = new THREE.PointLight(0xffffff, 8, 700);
    kl.position.set(150, 100, 180);
    scene.add(kl);
    const pl = new THREE.PointLight(0xa78bfa, 3, 400);
    pl.position.set(-80, -40, 80);
    scene.add(pl);

    /* ── Node positions ── */
    function goldenSphere(n, rMin, rMax) {
      const phi = Math.PI * (3 - Math.sqrt(5));
      return Array.from({ length: n }, (_, i) => {
        const y = 1 - (i / (n - 1)) * 2;
        const r = Math.sqrt(1 - y * y);
        const t = phi * i;
        const d = rMin + (((i * 7) % 13) / 13) * (rMax - rMin);
        return new THREE.Vector3(Math.cos(t) * r * d, y * d, Math.sin(t) * r * d);
      });
    }
    const basePositions = goldenSphere(NODE_COUNT, 72, 118);

    /* ── Nodes ── */
    const PALETTE    = [0xa78bfa, 0x9333ea];
    const nodeMeshes = [];
    const labelDivs  = [];
    const nodePhases = [];
    const nodeRadius = isMobile ? 6 : 8;

    labels.forEach((label, i) => {
      const color = new THREE.Color(PALETTE[i % 2]);
      const mat = new THREE.MeshStandardMaterial({
        color, emissive: color, emissiveIntensity: 0.35,
        roughness: 0.3, metalness: 0.2,
      });
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(nodeRadius, 32, 32), mat);
      mesh.position.copy(basePositions[i]);
      mesh.userData.index = i;
      mesh.userData.basePosition = basePositions[i].clone();
      scene.add(mesh);
      nodeMeshes.push(mesh);
      nodePhases.push(Math.PI * 2 * (i / NODE_COUNT) + i * 0.73);

      const div = document.createElement('div');
      div.className = 'node-label';
      div.textContent = label;
      const lobj = new CSS2DObject(div);
      lobj.position.set(0, nodeRadius + 6, 0);
      mesh.add(lobj);
      labelDivs.push(div);
    });

    /* ── Connection lines ── */
    const linePos  = new Float32Array(edges.length * 6);
    const lineGeo  = new THREE.BufferGeometry();
    const linePosA = new THREE.BufferAttribute(linePos, 3);
    lineGeo.setAttribute('position', linePosA);
    const edgeCol  = new Float32Array(edges.length * 6);
    const colAttr  = new THREE.BufferAttribute(edgeCol, 3);
    lineGeo.setAttribute('color', colAttr);
    const lineMat  = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.6 });
    scene.add(new THREE.LineSegments(lineGeo, lineMat));
    const COL_DIM  = new THREE.Color(0xa78bfa).multiplyScalar(0.45);
    const COL_HIGH = new THREE.Color(0xa78bfa);

    /* ── Adjacency ── */
    const adjacency = Array.from({ length: NODE_COUNT }, () => new Set());
    edges.forEach(([a,b]) => { adjacency[a].add(b); adjacency[b].add(a); });

    /* ── Camera fixed, scene rotates via quaternion ── */
    const sceneQuat = new THREE.Quaternion();
    const _qTmp     = new THREE.Quaternion();
    const _axX      = new THREE.Vector3(1, 0, 0);
    const _axY      = new THREE.Vector3(0, 1, 0);
    camera.position.set(0, 0, CAM_R);
    camera.lookAt(0, 0, 0);

    /* ── Drag: rotate scene in screen-space (no limits, no gimbal lock) ── */
    let dragging = false;
    let lastX = 0, lastY = 0;
    const SENS = 0.005;

    function applyOrbit(dx, dy) {
      // Camera is fixed → screen X = world X, screen Y = world Y, always
      _qTmp.setFromAxisAngle(_axY,  dx * SENS); sceneQuat.premultiply(_qTmp);
      _qTmp.setFromAxisAngle(_axX,  dy * SENS); sceneQuat.premultiply(_qTmp);
      scene.quaternion.copy(sceneQuat);
    }

    wrapper.addEventListener('mousedown', e => {
      dragging = true; lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      applyOrbit(e.clientX - lastX, e.clientY - lastY);
      lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mouseup',    () => { dragging = false; });
    window.addEventListener('mouseleave', () => { dragging = false; });

    wrapper.addEventListener('touchstart', e => {
      dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchmove', e => {
      if (!dragging) return;
      applyOrbit(e.touches[0].clientX - lastX, e.touches[0].clientY - lastY);
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchend', () => { dragging = false; });

    /* ── Hover / raycaster ── */
    const raycaster = new THREE.Raycaster();
    const mouse     = new THREE.Vector2(-9999, -9999);
    wrapper.addEventListener('mousemove', e => {
      const r = wrapper.getBoundingClientRect();
      mouse.x =  ((e.clientX - r.left) / r.width)  * 2 - 1;
      mouse.y = -((e.clientY - r.top)  / r.height) * 2 + 1;
    });
    wrapper.addEventListener('mouseleave', () => mouse.set(-9999, -9999));

    /* ── Resize ── */
    function resize() {
      const w = wrapper.clientWidth, h = wrapper.clientHeight;
      renderer.setSize(w, h, false);
      labelRenderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    new ResizeObserver(resize).observe(wrapper);
    resize();

    /* ── Animate ── */
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 1 / 60;

      if (!dragging) {
        // Auto-rotate scene around Y + gentle vertical wander
        _qTmp.setFromAxisAngle(_axY, 0.0023);
        sceneQuat.premultiply(_qTmp);
        _qTmp.setFromAxisAngle(_axX, Math.sin(t * 0.08) * 0.003 + Math.sin(t * 0.051) * 0.002);
        sceneQuat.premultiply(_qTmp);
        scene.quaternion.copy(sceneQuat);
      }

      raycaster.setFromCamera(mouse, camera);
      const hits     = raycaster.intersectObjects(nodeMeshes);
      const newHover = hits.length ? hits[0].object.userData.index : -1;
      const anyHover = newHover >= 0;

      nodeMeshes.forEach((mesh, i) => {
        const base = mesh.userData.basePosition, ph = nodePhases[i];
        mesh.position.x = base.x + Math.sin(t * FLOAT_SPD       + ph) * FLOAT_AMP;
        mesh.position.y = base.y + Math.cos(t * FLOAT_SPD * 1.3 + ph * 1.1) * FLOAT_AMP;
        mesh.position.z = base.z + Math.sin(t * FLOAT_SPD * 0.9 + ph * 0.7) * FLOAT_AMP;

        const isH = i === newHover;
        const isN = anyHover && adjacency[newHover].has(i);
        const isD = anyHover && !isH && !isN;
        const tEmit = isH ? 1.0 : isN ? 0.6 : isD ? 0.1 : 0.35;
        mesh.material.emissiveIntensity += (tEmit - mesh.material.emissiveIntensity) * 0.12;

        const div = labelDivs[i];
        if (isH)      { div.style.color = '#c4b5fd'; div.style.opacity = '1';    div.style.fontSize = '11px'; }
        else if (isN) { div.style.color = '#d1d5db'; div.style.opacity = '0.85'; div.style.fontSize = '10px'; }
        else if (isD) { div.style.color = '#9ca3af'; div.style.opacity = '0.12'; div.style.fontSize = '10px'; }
        else          { div.style.color = '#9ca3af'; div.style.opacity = '0.55'; div.style.fontSize = '10px'; }
      });

      edges.forEach(([a,b], i) => {
        const pa = nodeMeshes[a].position, pb = nodeMeshes[b].position, o = i * 6;
        linePos[o]   = pa.x; linePos[o+1] = pa.y; linePos[o+2] = pa.z;
        linePos[o+3] = pb.x; linePos[o+4] = pb.y; linePos[o+5] = pb.z;
        const c = (anyHover && (a===newHover||b===newHover)) ? COL_HIGH : COL_DIM;
        edgeCol[o]=c.r; edgeCol[o+1]=c.g; edgeCol[o+2]=c.b;
        edgeCol[o+3]=c.r; edgeCol[o+4]=c.g; edgeCol[o+5]=c.b;
      });
      linePosA.needsUpdate = true;
      colAttr.needsUpdate  = true;

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
